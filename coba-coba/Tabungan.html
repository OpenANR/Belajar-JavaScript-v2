<!doctype html>
<html>
    <head>
        <title>Tabungan</title>
    </head>
    <body>
        <h1>Aplikasi Tabungan</h1>
        <p>Solusi pencatatan keuangan yang efisien dan cepat.</p>
        <hr />

        <h3>Jumlah Uang : <span id="display">Rp0</span></h3>

        <p>Masukkan jumlah uang anda di dalam input yang ada di bawah ini.</p>
        <label>Tambah Tabungan: </label><br />
        <input type="number" id="inputUang" placeholder="Masukkan Uang..." />
        <button id="tambah">TAMBAH</button>
        <br />

        <label>Ambil Tabungan: </label><br />
        <input type="number" id="ambilUang" placeholder="Masukkan Uang..." />
        <button id="ambil">AMBIL</button>

        <button id="clearHistory">BERSIHKAN RIWAYAT</button>
        <ul id="list"></ul>

        <script>
            let keuangan = 0;
            const display = document.getElementById("display");
            const inputUang = document.getElementById("inputUang");
            const tambah = document.getElementById("tambah");
            const ambilUang = document.getElementById("ambilUang");
            const ambil = document.getElementById("ambil");
            const clearHistory = document.getElementById('clearHistory');

            function DisplayKeuangan() {
                display.innerText = ConvertToRupiah();
            }

            function TambahTabungan() {
                const getInputUang = Number(inputUang.value);
                if (getInputUang <= 0) {
                    alert(
                        "Masukkan jumlah uang yang ingin di tabung dan tidak boleh 0",
                    );
                    return;
                }
                keuangan += getInputUang;
                RiwayatTambah(getInputUang);
                DisplayKeuangan();
                const formatRupiah = getInputUang.toLocaleString('id-ID');
                alert(`Berhasil menabung dengan jumlah Rp${formatRupiah}. Total tabungan ${ConvertToRupiah()}`);
                inputUang.value = "";
                
            }

            function TarikTabungan() {
                const getAmbilUang = Number(ambilUang.value);
                if (getAmbilUang <= 0) {
                    alert(
                        "Masukkan jumlah uang yang ingin diambil dan tidak boleh 0",
                    );
                    return;
                } else if (getAmbilUang > keuangan) {
                    alert("Jumlah uang yang diambil tidak mencukupi");
                    return;
                }
                keuangan -= getAmbilUang;
                RiwayatAmbil(getAmbilUang);
                DisplayKeuangan();
                const formatRupiah = getAmbilUang.toLocaleString('id-ID');
                alert(`Berhasil mengambil dengan jumlah Rp${formatRupiah}. Total tabungan ${ConvertToRupiah()}`);
                ambilUang.value = "";
            }

            function RiwayatTambah(input){
                const formatRupiah = input.toLocaleString('id-ID');
                const li = document.createElement('li');
                li.innerText = `Anda menabung Rp${formatRupiah}. Total tabungan ${ConvertToRupiah()}`;
                list.append(li);
            }

            function RiwayatAmbil(input){
                const formatRupiah = input.toLocaleString('id-ID');
                const li = document.createElement('li');
                li.innerText = `Anda mengambil Rp${formatRupiah}. Total tabungan ${ConvertToRupiah()}`;
                list.append(li);
            }

            function ConvertToRupiah(){
                const formatRupiah = keuangan.toLocaleString('id-ID');
                const hasilFormat = `Rp${formatRupiah}`;
                return hasilFormat;
            }

            function ClearHistory(){
                if (confirm('Yakin riwayat tabungan akan dihapus ?')){
                    list.innerText = '';
                    alert('Riwayat tabungan berhasil dihapus.');
                } else {
                    alert('Dibatalkan');
                }
            }

            tambah.addEventListener("click", () => {
                TambahTabungan(); 
            });

            ambil.addEventListener("click", () => {
                TarikTabungan();
            });

            clearHistory.addEventListener('click', () => {
                ClearHistory();
            })

            inputUang.addEventListener('keydown', function(event){
                if (event.key === 'Enter'){
                    TambahTabungan();
                }
            });

            ambilUang.addEventListener('keydown', function(event){
                if (event.key === 'Enter'){
                    TarikTabungan();
                }
            })
        </script>
    </body>
</html>
