<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>APLIKASI PENGISI SALDO SEDERHANA</h3>
    <h3>Jumlah Saldo : <span id="display">0</span></h3>
    <input type="number" name="" id="isiSaldo">
    <input type="number" name="" id="tarikSaldo">
    <button id="tambah">TAMBAH</button>
    <button id="tarik">TARIK</button>
    <button id="reset">RESET SALDO</button>

    <script>
        let saldo = Number(localStorage.getItem('saveSaldo')) || 0;

        const display = document.getElementById('display');
        const isiSaldo = document.getElementById('isiSaldo');
        const tarikSaldo = document.getElementById('tarikSaldo');
        const tambah = document.getElementById('tambah');
        const tarik = document.getElementById('tarik');
        const reset = document.getElementById('reset');

        display.innerHTML = ConvertToRupiah();

        function ProsesIsiSaldo(){
            const getSaldoValue = Number(isiSaldo.value);
            if (getSaldoValue < 20000){
                alert('Isi saldo minimal Rp20.000');
                return;
            }
            saldo += getSaldoValue;
            localStorage.setItem('saveSaldo', saldo);
            ConvertToRupiah();

            const formatValueToRupiah = getSaldoValue.toLocaleString('id-ID');
            alert(`Isi saldo berjumlah Rp${formatValueToRupiah} telah berhasil`);
            isiSaldo.value = '';
        }

        function TarikIsiSaldo(){
            const getCurrentSaldo = Number(tarikSaldo.value);
            if (getCurrentSaldo > saldo){
                alert('Tarik saldo melebihi jumlah saldo saat ini !');
                return;
            }

            if (getCurrentSaldo < 10000){
                alert('Minimal tarik saldo adalah Rp10.000');
                return;
            }
            saldo -= getCurrentSaldo;
            localStorage.setItem('saveSaldo', saldo);
            ConvertToRupiah();
            const formatValueToRupiah = getCurrentSaldo.toLocaleString('id-ID');
            alert(`Tarik saldo berjumlah Rp${formatValueToRupiah} telah berhasil. Saldo anda saat ini adalah ${ConvertToRupiah()}`);
            tarikSaldo.value = '';
        }

        function ResetSaldo(){
            saldo = 0
            localStorage.removeItem('saveSaldo');
            alert('Saldo berhasil direset. Catatan: Hanya untuk pengujian');
            ConvertToRupiah();
        }

        function ConvertToRupiah(){
            const formatRupiah = saldo.toLocaleString('id-ID');
            const hasilFormat = `Rp${formatRupiah}`;
            display.innerText = hasilFormat;
            return hasilFormat;   
        }
        
        tambah.addEventListener('click', () => {
            ProsesIsiSaldo();
            
        });

        tarik.addEventListener('click', () => {
            TarikIsiSaldo();
            
        });

        // Reset saldo hanya untuk pengujian sistem
        reset.addEventListener('click', () => {
            ResetSaldo();
            
        });
        ConvertToRupiah();

        
    </script>
</body>
</html>
