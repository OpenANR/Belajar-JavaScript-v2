    <button class="satu">SATU</button>
    <input type="text" name="" id="output2">
    <script>
        
        const output = document.getElementById('output');
        const tombolHuruf = document.querySelectorAll('.tombolHuruf');
        const satu = document.querySelector('.satu');

        function Tampilkan(){
