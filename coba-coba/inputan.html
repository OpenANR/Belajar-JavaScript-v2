<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <textarea name="" id="inputan"></textarea>
    <p id="teks"></p>
    <p>Jumlah Karakter : <strong id="jumlah"></strong></p>
    <script>
        let inputan = document.getElementById('inputan');
        let teks = document.getElementById('teks');
        let jumlah = document.getElementById('jumlah');

        function Realtime(){
            teks.innerText = inputan.value;
            jumlah.innerText = inputan.value.length;
            const limit = inputan.value.length;
            console.log(limit);

            if (limit > 10){
                alert('halo');
                return;
            }
        }
        document.addEventListener('input', () => {
            Realtime();
        });
    </script>
</body>
</html>
