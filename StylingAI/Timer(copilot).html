<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer JavaScript = Copilot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            text-align: center;
            min-width: 350px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        h3 {
            color: #666;
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        #display {
            font-size: 80px;
            font-weight: 700;
            color: #667eea;
            display: block;
            margin: 30px 0;
            font-family: 'Courier New', monospace;
            letter-spacing: 5px;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            flex: 1;
            min-width: 100px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        #start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        #start:active {
            transform: translateY(0);
        }

        #stop {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        #stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }

        #stop:active {
            transform: translateY(0);
        }

        #reset {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        #reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);
        }

        #reset:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 35px 25px;
                min-width: 280px;
            }

            h1 {
                font-size: 24px;
            }

            #display {
                font-size: 60px;
            }

            button {
                padding: 12px 20px;
                font-size: 14px;
            }

            .button-group {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Timer JavaScript</h1>
        <h3>Angka = <span id="display">0</span></h3>
        
        <div class="button-group">
            <button id="start">Mulai</button>
            <button id="stop">Stop</button>
            <button id="reset">Reset</button>
        </div>
    </div>

    <script>
        let angka = 0;
        let timer;

        const display = document.getElementById('display');
        const start = document.getElementById('start');
        const stop = document.getElementById('stop');
        const reset = document.getElementById('reset');

        function updateNumber(){
            angka++;
            display.textContent = angka;
        }

        start.addEventListener('click', () => {
            clearInterval(timer);
            timer = setInterval(updateNumber, 1000);
        });

        stop.addEventListener('click', () => {
            clearInterval(timer);
        })

        reset.addEventListener('click', () => {
            clearInterval(timer);
            angka = 0;
            display.textContent = angka;
        });
    </script>
</body>
</html>
