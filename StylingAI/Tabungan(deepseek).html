<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tabungan</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
            rel="stylesheet"
        />
        <style>
            /* ===== RESET & BASE ===== */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
                background: #f0f4f8;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 24px;
                margin: 0;
                line-height: 1.6;
            }

            /* ===== MAIN CONTAINER ===== */
            .app-container {
                max-width: 720px;
                width: 100%;
                background: #ffffff;
                border-radius: 28px;
                box-shadow: 0 20px 60px rgba(0, 20, 40, 0.08), 0 8px 24px rgba(0, 20, 40, 0.04);
                padding: 40px 44px;
                transition: box-shadow 0.25s ease;
            }

            .app-container:hover {
                box-shadow: 0 28px 72px rgba(0, 20, 40, 0.12);
            }

            /* ===== HEADER ===== */
            .app-header {
                margin-bottom: 28px;
                padding-bottom: 20px;
                border-bottom: 2px solid #f0f4f8;
            }

            .app-header h1 {
                font-size: 28px;
                font-weight: 700;
                letter-spacing: -0.4px;
                color: #0b1a2e;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .app-header h1 span {
                background: linear-gradient(135deg, #2563eb, #7c3aed);
                font-size: 18px;
                font-weight: 600;
                color: #fff;
                padding: 2px 14px;
                border-radius: 40px;
                letter-spacing: 0;
            }

            .app-header p {
                font-size: 15px;
                color: #5e6f8d;
                margin-top: 4px;
                font-weight: 400;
            }

            /* ===== SALDO CARD ===== */
            .saldo-card {
                background: linear-gradient(145deg, #0b1a2e, #142b44);
                border-radius: 20px;
                padding: 28px 32px;
                margin-bottom: 32px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 12px;
                box-shadow: 0 8px 24px rgba(11, 26, 46, 0.20);
            }

            .saldo-label {
                font-size: 14px;
                font-weight: 500;
                color: rgba(255, 255, 255, 0.60);
                text-transform: uppercase;
                letter-spacing: 0.6px;
            }

            .saldo-value {
                font-size: 36px;
                font-weight: 700;
                color: #ffffff;
                letter-spacing: -0.5px;
                word-break: break-word;
            }

            .saldo-value small {
                font-size: 18px;
                font-weight: 500;
                color: rgba(255, 255, 255, 0.50);
                margin-left: 2px;
            }

            /* ===== SECTION TITLE ===== */
            .section-title {
                font-size: 13px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: #5e6f8d;
                margin-bottom: 14px;
            }

            /* ===== FORM GROUP ===== */
            .form-group {
                margin-bottom: 20px;
            }

            .form-group:last-of-type {
                margin-bottom: 28px;
            }

            .form-group label {
                display: block;
                font-size: 14px;
                font-weight: 600;
                color: #1e2d47;
                margin-bottom: 6px;
            }

            .form-row {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }

            .form-row input[type="number"] {
                flex: 1;
                min-width: 160px;
                padding: 12px 16px;
                border: 2px solid #e2e8f0;
                border-radius: 14px;
                font-size: 15px;
                font-weight: 500;
                color: #0b1a2e;
                background: #f9fafc;
                transition: border-color 0.2s ease, box-shadow 0.2s ease;
                outline: none;
                font-family: inherit;
            }

            .form-row input[type="number"]:focus {
                border-color: #2563eb;
                box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
                background: #ffffff;
            }

            .form-row input[type="number"]::placeholder {
                color: #a0b3cc;
                font-weight: 400;
            }

            /* ===== BUTTONS ===== */
            .btn {
                padding: 12px 24px;
                border: none;
                border-radius: 14px;
                font-size: 14px;
                font-weight: 600;
                font-family: inherit;
                cursor: pointer;
                transition: all 0.2s ease;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
                white-space: nowrap;
                letter-spacing: 0.2px;
            }

            .btn:active {
                transform: scale(0.96);
            }

            .btn-primary {
                background: linear-gradient(135deg, #2563eb, #4f46e5);
                color: #ffffff;
                box-shadow: 0 4px 12px rgba(37, 99, 235, 0.30);
            }

            .btn-primary:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
            }

            .btn-danger {
                background: linear-gradient(135deg, #dc2626, #b91c1c);
                color: #ffffff;
                box-shadow: 0 4px 12px rgba(220, 38, 38, 0.25);
            }

            .btn-danger:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(220, 38, 38, 0.30);
            }

            .btn-outline {
                background: transparent;
                color: #5e6f8d;
                border: 2px solid #e2e8f0;
            }

            .btn-outline:hover {
                background: #f0f4f8;
                border-color: #cbd5e1;
            }

            .btn-sm {
                padding: 10px 18px;
                font-size: 13px;
            }

            .btn-block {
                width: 100%;
                justify-content: center;
            }

            /* ===== ACTION BAR ===== */
            .action-bar {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                margin-top: 4px;
                margin-bottom: 28px;
            }

            .action-bar .btn {
                flex: 1;
                min-width: 120px;
            }

            /* ===== CLEAR HISTORY ===== */
            .clear-wrapper {
                display: flex;
                justify-content: flex-end;
                margin-bottom: 14px;
            }

            /* ===== RIWAYAT LIST ===== */
            .history-section {
                border-top: 2px solid #f0f4f8;
                padding-top: 20px;
                margin-top: 4px;
            }

            .history-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 12px;
            }

            .history-header .section-title {
                margin-bottom: 0;
            }

            .history-list {
                list-style: none;
                padding: 0;
                margin: 0;
                max-height: 240px;
                overflow-y: auto;
                padding-right: 4px;
            }

            .history-list::-webkit-scrollbar {
                width: 5px;
            }

            .history-list::-webkit-scrollbar-track {
                background: #f0f4f8;
                border-radius: 10px;
            }

            .history-list::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border-radius: 10px;
            }

            .history-list li {
                background: #f9fafc;
                padding: 12px 16px;
                border-radius: 12px;
                margin-bottom: 8px;
                font-size: 14px;
                color: #1e2d47;
                border-left: 4px solid #2563eb;
                transition: background 0.15s ease;
                display: flex;
                align-items: center;
                gap: 8px;
                word-break: break-word;
            }

            .history-list li:last-child {
                margin-bottom: 0;
            }

            .history-list li:hover {
                background: #f0f4ff;
            }

            .history-list li .emoji {
                font-size: 18px;
                flex-shrink: 0;
            }

            .history-list li .detail {
                flex: 1;
            }

            .history-list li .badge {
                font-size: 12px;
                font-weight: 600;
                padding: 2px 10px;
                border-radius: 40px;
                background: #e2e8f0;
                color: #475569;
                flex-shrink: 0;
            }

            .history-list li .badge.tambah {
                background: #dbeafe;
                color: #1d4ed8;
            }

            .history-list li .badge.ambil {
                background: #fee2e2;
                color: #b91c1c;
            }

            /* ===== EMPTY STATE ===== */
            .empty-state {
                text-align: center;
                padding: 24px 12px 12px;
                color: #a0b3cc;
                font-size: 14px;
            }

            .empty-state .icon {
                font-size: 32px;
                display: block;
                margin-bottom: 6px;
            }

            /* ===== RESPONSIVE ===== */
            @media (max-width: 600px) {
                .app-container {
                    padding: 24px 18px;
                    border-radius: 20px;
                }

                .app-header h1 {
                    font-size: 22px;
                    flex-wrap: wrap;
                }

                .saldo-card {
                    padding: 20px;
                    flex-direction: column;
                    align-items: flex-start;
                }

                .saldo-value {
                    font-size: 28px;
                }

                .form-row {
                    flex-direction: column;
                }

                .form-row input[type="number"] {
                    min-width: unset;
                    width: 100%;
                }

                .action-bar {
                    flex-direction: column;
                }

                .action-bar .btn {
                    width: 100%;
                }

                .clear-wrapper {
                    justify-content: stretch;
                }

                .clear-wrapper .btn {
                    width: 100%;
                }

                .history-list li {
                    flex-wrap: wrap;
                    padding: 10px 14px;
                }
            }

            @media (max-width: 400px) {
                .app-container {
                    padding: 16px 12px;
                }

                .saldo-value {
                    font-size: 24px;
                }
            }

            /* ===== UTILITY ===== */
            .mt-1 {
                margin-top: 4px;
            }
            .mb-1 {
                margin-bottom: 4px;
            }
            .gap-1 {
                gap: 4px;
            }
            .text-muted {
                color: #5e6f8d;
            }
        </style>
    </head>
    <body>
        <div class="app-container">
            <!-- HEADER -->
            <div class="app-header">
                <h1>
                    💰 Tabungan
                    <span>v1</span>
                </h1>
                <p>Solusi pencatatan keuangan yang efisien dan cepat.</p>
            </div>

            <!-- SALDO -->
            <div class="saldo-card">
                <span class="saldo-label">💳 Total Saldo</span>
                <span class="saldo-value" id="display">Rp0</span>
            </div>

            <!-- FORM TAMBAH -->
            <div class="form-group">
                <label for="inputUang">📥 Tambah Tabungan</label>
                <div class="form-row">
                    <input
                        type="number"
                        id="inputUang"
                        placeholder="Masukkan jumlah…"
                        min="0"
                        step="1000"
                    />
                    <button class="btn btn-primary" id="tambah">Tambah</button>
                </div>
            </div>

            <!-- FORM AMBIL -->
            <div class="form-group">
                <label for="ambilUang">📤 Ambil Tabungan</label>
                <div class="form-row">
                    <input
                        type="number"
                        id="ambilUang"
                        placeholder="Masukkan jumlah…"
                        min="0"
                        step="1000"
                    />
                    <button class="btn btn-danger" id="ambil">Ambil</button>
                </div>
            </div>

            <!-- RIWAYAT -->
            <div class="history-section">
                <div class="history-header">
                    <span class="section-title">📋 Riwayat Transaksi</span>
                    <button class="btn btn-outline btn-sm" id="clearHistory">
                        🗑️ Bersihkan
                    </button>
                </div>
                <ul class="history-list" id="list">
                    <li class="empty-state">
                        <span class="icon">📭</span>
                        Belum ada transaksi
                    </li>
                </ul>
            </div>
        </div>

        <script>
            // ===== STATE =====
            let keuangan = 0;
            const display = document.getElementById('display');
            const inputUang = document.getElementById('inputUang');
            const tambah = document.getElementById('tambah');
            const ambilUang = document.getElementById('ambilUang');
            const ambil = document.getElementById('ambil');
            const clearHistory = document.getElementById('clearHistory');
            const list = document.getElementById('list');

            // ===== HELPERS =====
            function ConvertToRupiah() {
                return `Rp${keuangan.toLocaleString('id-ID')}`;
            }

            function DisplayKeuangan() {
                display.innerText = ConvertToRupiah();
            }

            function formatRupiah(value) {
                return `Rp${value.toLocaleString('id-ID')}`;
            }

            function removeEmptyState() {
                const empty = list.querySelector('.empty-state');
                if (empty) empty.remove();
            }

            function addEmptyState() {
                if (list.children.length === 0) {
                    const li = document.createElement('li');
                    li.className = 'empty-state';
                    li.innerHTML = `<span class="icon">📭</span> Belum ada transaksi`;
                    list.append(li);
                }
            }

            // ===== RIWAYAT =====
            function RiwayatTambah(input) {
                removeEmptyState();
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="emoji">📈</span>
                    <span class="detail">Menabung <strong>${formatRupiah(input)}</strong></span>
                    <span class="badge tambah">+</span>
                `;
                list.prepend(li);
            }

            function RiwayatAmbil(input) {
                removeEmptyState();
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="emoji">📉</span>
                    <span class="detail">Mengambil <strong>${formatRupiah(input)}</strong></span>
                    <span class="badge ambil">−</span>
                `;
                list.prepend(li);
            }

            // ===== TAMBAH =====
            function TambahTabungan() {
                const getInputUang = Number(inputUang.value);
                if (getInputUang <= 0 || isNaN(getInputUang)) {
                    alert('Masukkan jumlah uang yang ingin ditabung (minimal 1).');
                    return;
                }
                keuangan += getInputUang;
                RiwayatTambah(getInputUang);
                DisplayKeuangan();
                alert(
                    `✅ Berhasil menabung ${formatRupiah(getInputUang)}.\nTotal tabungan sekarang ${ConvertToRupiah()}.`
                );
                inputUang.value = '';
            }

            // ===== AMBIL =====
            function TarikTabungan() {
                const getAmbilUang = Number(ambilUang.value);
                if (getAmbilUang <= 0 || isNaN(getAmbilUang)) {
                    alert('Masukkan jumlah uang yang ingin diambil (minimal 1).');
                    return;
                }
                if (getAmbilUang > keuangan) {
                    alert('❌ Saldo tidak mencukupi!');
                    return;
                }
                keuangan -= getAmbilUang;
                RiwayatAmbil(getAmbilUang);
                DisplayKeuangan();
                alert(
                    `✅ Berhasil mengambil ${formatRupiah(getAmbilUang)}.\nTotal tabungan sekarang ${ConvertToRupiah()}.`
                );
                ambilUang.value = '';
            }

            // ===== CLEAR =====
            function ClearHistory() {
                if (list.children.length === 0) return;
                if (confirm('Yakin ingin menghapus semua riwayat transaksi?')) {
                    list.innerHTML = '';
                    addEmptyState();
                    alert('🗑️ Riwayat tabungan berhasil dibersihkan.');
                }
            }

            // ===== EVENT LISTENERS =====
            tambah.addEventListener('click', TambahTabungan);
            ambil.addEventListener('click', TarikTabungan);
            clearHistory.addEventListener('click', ClearHistory);

            // ===== ENTER KEY SUPPORT =====
            inputUang.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') TambahTabungan();
            });
            ambilUang.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') TarikTabungan();
            });

            // ===== INIT =====
            DisplayKeuangan();
            addEmptyState();
        </script>
    </body>
</html>
