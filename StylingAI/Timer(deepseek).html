<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer JavaScript - DeepSeek</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style>
        /* ─── Reset & Base ─── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #e9f0f5 100%);
            padding: 1.5rem;
        }

        /* ─── Card ─── */
        .timer-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 2.5rem;
            padding: 3rem 3.5rem 3.5rem;
            max-width: 520px;
            width: 100%;
            box-shadow:
                0 20px 60px rgba(0, 20, 30, 0.10),
                0 8px 24px rgba(0, 20, 30, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: box-shadow 0.3s ease;
            text-align: center;
        }

        .timer-card:hover {
            box-shadow:
                0 30px 80px rgba(0, 20, 30, 0.12),
                0 10px 32px rgba(0, 20, 30, 0.07),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        /* ─── Header ─── */
        .timer-header {
            margin-bottom: 2rem;
        }

        .timer-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #1a2e3f;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .timer-header h1 span {
            display: inline-block;
            background: #d0e2ed;
            padding: 0.15rem 0.6rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: #1a3b4f;
            background: rgba(26, 62, 79, 0.08);
        }

        .timer-header .sub {
            font-size: 0.85rem;
            color: #5a7388;
            margin-top: 0.3rem;
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        /* ─── Display ─── */
        .display-wrapper {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 0.75rem 1.5rem;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .display-number {
            font-size: 5.5rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #0b222f;
            font-variant-numeric: tabular-nums;
            line-height: 1.2;
            transition: color 0.25s ease;
            min-height: 6rem;
        }

        .display-number.running {
            color: #0f3b4e;
        }

        .display-label {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #6b8a9e;
            margin-top: 0.1rem;
        }

        /* ─── Controls ─── */
        .controls {
            display: flex;
            gap: 0.85rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .controls button {
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.22, 0.68, 0.35, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-width: 110px;
            letter-spacing: 0.01em;
            position: relative;
            overflow: hidden;
        }

        /* ── Start ── */
        .btn-start {
            background: #1f4e66;
            color: #fff;
            box-shadow: 0 4px 14px rgba(26, 78, 102, 0.30);
        }

        .btn-start:hover {
            background: #18455b;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(26, 78, 102, 0.35);
        }

        .btn-start:active {
            transform: translateY(0px);
            box-shadow: 0 4px 12px rgba(26, 78, 102, 0.25);
        }

        .btn-start:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 4px 10px rgba(26, 78, 102, 0.10);
            pointer-events: none;
        }

        /* ── Stop ── */
        .btn-stop {
            background: #eef3f8;
            color: #1c4054;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .btn-stop:hover {
            background: #e3eaf1;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.04);
        }

        .btn-stop:active {
            transform: translateY(0px);
        }

        .btn-stop:disabled {
            opacity: 0.4;
            transform: none;
            pointer-events: none;
        }

        /* ── Reset ── */
        .btn-reset {
            background: transparent;
            color: #3f6178;
            border: 1px solid rgba(63, 97, 120, 0.20);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.01);
        }

        .btn-reset:hover {
            background: rgba(63, 97, 120, 0.06);
            border-color: rgba(63, 97, 120, 0.30);
            transform: translateY(-2px);
        }

        .btn-reset:active {
            transform: translateY(0px);
        }

        /* ─── Icons (inline SVG) ─── */
        .btn-icon {
            display: inline-block;
            width: 1.1em;
            height: 1.1em;
            flex-shrink: 0;
            vertical-align: middle;
        }

        /* ─── Status indicator ─── */
        .status-badge {
            margin-top: 1.8rem;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #7a98ac;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #b4ccdb;
            transition: background 0.3s ease;
        }

        .status-dot.active {
            background: #2d8f5e;
            box-shadow: 0 0 0 3px rgba(45, 143, 94, 0.20);
        }

        /* ─── Responsive ─── */
        @media (max-width: 480px) {
            .timer-card {
                padding: 2rem 1.5rem 2.5rem;
                border-radius: 2rem;
            }

            .display-number {
                font-size: 4rem;
                min-height: 4.5rem;
            }

            .controls button {
                font-size: 0.85rem;
                padding: 0.7rem 1.2rem;
                min-width: 90px;
                flex: 1 1 auto;
            }

            .controls {
                gap: 0.6rem;
            }

            .timer-header h1 {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 380px) {
            .display-number {
                font-size: 3.2rem;
            }

            .controls button {
                font-size: 0.75rem;
                padding: 0.6rem 0.8rem;
                min-width: 70px;
            }
        }

        /* ─── A tiny "pulse" on number change (optional) ─── */
        .display-number.pulse {
            animation: pulse 0.15s ease;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.03);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="timer-card">

        <!-- Header -->
        <div class="timer-header">
            <h1>
                ⏱ Timer
                <span>JS</span>
            </h1>
            <p class="sub">Counting every second</p>
        </div>

        <!-- Display -->
        <div class="display-wrapper">
            <div class="display-number" id="display">0</div>
            <div class="display-label">seconds</div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn-start" id="start">
                <!-- Play icon -->
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3" />
                </svg>
                Mulai
            </button>

            <button class="btn-stop" id="stop">
                <!-- Pause icon -->
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="6" y="4" width="4" height="16" />
                    <rect x="14" y="4" width="4" height="16" />
                </svg>
                Stop
            </button>

            <button class="btn-reset" id="reset">
                <!-- Reset / refresh icon -->
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9m0 0v6m0-6h-6" />
                </svg>
                Reset
            </button>
        </div>

        <!-- Status -->
        <div class="status-badge">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Siap</span>
        </div>

    </div>

    <script>
        // ─── DOM refs ───
        const displayEl = document.getElementById('display');
        const startBtn = document.getElementById('start');
        const stopBtn = document.getElementById('stop');
        const resetBtn = document.getElementById('reset');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // ─── State ───
        let angka = 0;
        let timer = null;
        let isRunning = false;

        // ─── Helpers ───
        function updateDisplay(value) {
            displayEl.textContent = value;
            // subtle pulse
            displayEl.classList.remove('pulse');
            // force reflow
            void displayEl.offsetWidth;
            displayEl.classList.add('pulse');
        }

        function setStatus(active) {
            if (active) {
                statusDot.classList.add('active');
                statusText.textContent = 'Berjalan';
                displayEl.classList.add('running');
            } else {
                statusDot.classList.remove('active');
                statusText.textContent = 'Berhenti';
                displayEl.classList.remove('running');
            }
        }

        function setRunning(state) {
            isRunning = state;
            startBtn.disabled = state;
            stopBtn.disabled = !state;
            setStatus(state);
        }

        // ─── Core functions ───
        function incrementNumber() {
            angka++;
            updateDisplay(angka);
        }

        function startTimer() {
            if (isRunning) return;
            // clear any lingering interval
            clearInterval(timer);
            timer = setInterval(incrementNumber, 1000);
            setRunning(true);
        }

        function stopTimer() {
            if (!isRunning) return;
            clearInterval(timer);
            timer = null;
            setRunning(false);
        }

        function resetTimer() {
            // stop if running
            if (isRunning) {
                clearInterval(timer);
                timer = null;
                setRunning(false);
            }
            angka = 0;
            updateDisplay(angka);
            // ensure status shows stopped
            setRunning(false);
        }

        // ─── Event listeners ───
        startBtn.addEventListener('click', startTimer);
        stopBtn.addEventListener('click', stopTimer);
        resetBtn.addEventListener('click', resetTimer);

        // ─── Keyboard shortcuts (bonus) ───
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                if (isRunning) {
                    stopTimer();
                } else {
                    startTimer();
                }
            }
            if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                resetTimer();
            }
        });

        // ─── Init ───
        updateDisplay(0);
        setRunning(false);
    </script>

</body>
</html>
