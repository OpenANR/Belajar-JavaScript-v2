<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer JavaScript - ChatGPT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        .container {
            width: 380px;
            background: #ffffff;
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            box-shadow:
                0 20px 40px rgba(0, 0, 0, .3);
        }

        h1 {
            color: #1e293b;
            margin-bottom: 30px;
            font-size: 30px;
        }

        h3 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #475569;
        }

        #display {
            font-size: 55px;
            color: #2563eb;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        button {
            border: none;
            padding: 12px 22px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: .25s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, .2);
        }

        button:active {
            transform: scale(.96);
        }

        #start {
            background: #22c55e;
        }

        #start:hover {
            background: #16a34a;
        }

        #stop {
            background: #ef4444;
        }

        #stop:hover {
            background: #dc2626;
        }

        #reset {
            background: #3b82f6;
        }

        #reset:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Timer JavaScript</h1>

        <h3>
            Angka =
            <span id="display">0</span>
        </h3>

        <div class="buttons">
            <button id="start">Mulai</button>
            <button id="stop">Stop</button>
            <button id="reset">Reset</button>
        </div>

    </div>

    <script>
        let angka = 0;
        let timer;

        const display = document.getElementById('display');
        const start = document.getElementById('start');
        const stop = document.getElementById('stop');
        const reset = document.getElementById('reset');

        function updateNumber(){
            angka++;
            display.textContent = angka;
        }

        start.addEventListener('click', () => {
            clearInterval(timer);
            timer = setInterval(updateNumber, 1000);
        });

        stop.addEventListener('click', () => {
            clearInterval(timer);
        })

        reset.addEventListener('click', () => {
            clearInterval(timer);
            angka = 0;
            display.textContent = angka;
        });
    </script>
</body>

</html>
