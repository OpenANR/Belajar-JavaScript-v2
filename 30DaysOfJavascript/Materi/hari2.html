<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hari 2</title>
</head>
<body>
    <script>
        // Primitive vs Non-Primitive
        let a = 3;
        let b = 3;
        console.log(a == b);

        let nums = [1, 2, 3];
        let numbers = [1, 2, 3];
        console.log(nums == numbers);

        let numbers2 = nums;
        console.log(numbers2 == nums);

        // Math Object - Operasi Angka
        console.log(Math.round(9.4));
        console.log(Math.floor(9.9));
        console.log(Math.ceil(9.1));
        console.log(Math.min(5, 2, 8));
        console.log(Math.max(5, 2, 8));
        console.log(Math.abs(-10));
        console.log(Math.sqrt(100));
        console.log(Math.pow(3, 2));

        let angkaAcak = Math.floor(Math.random() * 11);
        console.log(angkaAcak);

        // String Concatenation & Template Literal
        let nama = 'Nuzul' + ' ' + 'Nazil' + ' ' + 'Nuzha';
        console.log(nama);

        let umur = 20;
        console.log(`Nama saya ${nama}, Umur saya ${umur} tahun.`);

        // String Method
        let str = 'JavaScript';
        console.log(str.length);
        console.log(str[0]);
        console.log(str.toUpperCase());
        console.log(str.toLowerCase());
        console.log(str.includes('Script'));
        console.log(str.)

    </script>
</body>
</html>
