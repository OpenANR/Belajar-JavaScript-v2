<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML CSS Review</title>
    <style>
        .blue-button {
            background-color: rgb(101, 171, 241);
            color: white;
            border: none;
        }

        .green-button {
            background-color: rgb(10, 180, 112);
            color: white;
            border: none;
        }
    </style>
</head>

<body>
    <h1>Selamat Datang di Website ku</h1>
    <p>Kali ini kita akan belajar JavaScript di HTML</p>

    <p>Pertama kalian coba klik <button title="Tampilkan Pesan" class="blue-button" onclick="alert('Pop Up telah muncul');">Tombol</button> ini untuk memunculkan pesan pop up.</p>
    <p>Selanjutnya coba kalian klik <button title="Tampilkan Nama" class="green-button" onclick="alert('Halo, Ahmad Nuzulur Rozaq');">Tombol</button> ini untuk memunculkan nama kamu.</p>
    <p>Coba klik <button class="Tampilkan ke Console" onclick="console.log('Halo Nuzul, ini pesan yang tampil di dalam console JavaScript.')">Tombol</button> ini untuk memunculkan pesan ke dalam console JavaScript di browser.</p>
    <script>
        alert('Selamat Datang, coba klik tombol yang ada di dalam website.');
        console.log('Mantap ' + 'Boss');
    </script>
</body>

</html>
