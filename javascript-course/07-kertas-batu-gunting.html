<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boolean</title>
</head>

<body>
    <p>Percobaan</p>
    <button onclick="playGame('batu');">Batu</button>
    <button onclick="playGame('kertas');">Kertas</button>
    <button onclick="playGame('gunting');">Gunting</button>

    <script>

        function playGame(playerMove) {
            const computerMove = pickComputerMove();

            let result = '';

            if (playGame === 'batu') {
                if (computerMove === 'batu') {
                    result = 'Seri.';
                } else if (computerMove === 'kertas') {
                    result = 'Kamu kalah!';
                } else if (computerMove === 'gunting') {
                    result = 'Kamu menang!';
                }

            } else if (playGame === 'kertas') {
                if (computerMove === 'batu') {
                    result = 'Kamu menang';
                } else if (computerMove === 'kertas') {
                    result = 'seri.';
                } else if (computerMove === 'gunting') {
                    result = 'Kamu kalah!';
                }
                
            } else if (playGame === 'gunting') {
                if (computerMove === 'batu') {
                    result = 'Kamu kalah!';
                } else if (computerMove === 'kertas') {
                    result = 'Kamu menang';
                } else if (computerMove === 'gunting') {
                    result = 'Seri!';
                }

            }
            alert(`Kamu memilih ${playerMove}. Computer memilih ${computerMove}. Dan kamu ${result}`);
        }

        function pickComputerMove() {
            const randomNumber = Math.random();

            let computerMove = '';

            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                computerMove = 'batu';
            } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                computerMove = 'kertas';
            } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
                computerMove = 'gunting';
            }
            return computerMove;
        }
    </script>
</body>

</html>
