<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boolean</title>
</head>

<body>
    <p>Percobaan</p>
    <button onclick="playGame('batu');">Batu</button>
    <button onclick="playGame('kertas');">Kertas</button>
    <button onclick="playGame('gunting');">Gunting</button>
    <button onclick="
        score.menang = 0;
        score.kalah = 0;
        score.seri = 0;
        localStorage.removeItem('score');
    ">Reset Score</button>

    <script>

        let score = JSON.parse(localStorage.getItem('score'));
        console.log(score);

        if (score === null){
            score = {
                menang: 0,
                kalah: 0,
                seri: 0
            }
        }

        function playGame(playerMove) {
            const computerMove = pickComputerMove();

            let result = '';

            if (playerMove === 'batu') {
                if (computerMove === 'batu') {
                    result = 'Seri!';
                } else if (computerMove === 'kertas') {
                    result = 'Kamu kalah!';
                } else if (computerMove === 'gunting') {
                    result = 'Kamu menang!';
                }

            } else if (playerMove === 'kertas') {
                if (computerMove === 'batu') {
                    result = 'Kamu menang!';
                } else if (computerMove === 'kertas') {
                    result = 'Seri!';
                } else if (computerMove === 'gunting') {
                    result = 'Kamu kalah!';
                }
                
            } else if (playerMove === 'gunting') {
                if (computerMove === 'batu') {
                    result = 'Kamu kalah!';
                } else if (computerMove === 'kertas') {
                    result = 'Kamu menang!';
                } else if (computerMove === 'gunting') {
                    result = 'Seri!';
                }
            }

            if (result === 'Kamu menang!'){
                score.menang += 1;
            } else if (result === 'Kamu kalah!'){
                score.kalah += 1;
            } else if (result === 'Seri!'){
                score.seri += 1;
            }

            localStorage.setItem('score', JSON.stringify(score));
            
            alert(`Kamu memilih ${playerMove}. Computer memilih ${computerMove}. Hasil: ${result}
            Menang: ${score.menang}, Kalah: ${score.kalah}, Seri: ${score.seri}
            `);
        }

        function pickComputerMove() {
            const randomNumber = Math.random();

            let computerMove = '';

            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                computerMove = 'batu';
            } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                computerMove = 'kertas';
            } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
                computerMove = 'gunting';
            }
            return computerMove;
        }
    </script>
</body>

</html>
