<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Project</title>
</head>
<body>
    <p>Tombol Subscribe YouTube</p>
    <button class="js-subscribe-button">Subscribe</button>

    <p>Amazon Shipping Calculator</p>
    <input type="number" placeholder="Biaya pemesanan..." class="js-cost-input" onkeydown="handleCostKeydown(event);">
    <button onclick="calculateTotal();">Hitung</button>

    <p class="js-total-cost"></p>

    <script>
        
        function handleCostKeydown(event){
            if (event.key === 'Enter'){
                calculateTotal();
            }
        }

        function calculateTotal(){
            const inputElement = document.querySelector('.js-cost-input');
            let cost = Number(inputElement.value);

            if (cost < 40){
                cost = cost + 10;
            }

            document.querySelector('.js-total-cost').innerHTML = `$${cost}`;
        }

        const getButton = document.querySelector('.js-subscribe-button');
        
        function Subscribe(){

            if (getButton.innerText === 'Subscribe'){
                getButton.innerText = 'Disubscribe';
                alert('Anda telah subscribe');

            } else {
                getButton.innerText = 'Subscribe'
            }
        }
        getButton.addEventListener('click', () => {
            Subscribe();
        });
    </script>
</body>
</html>
